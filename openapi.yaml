info:
  title: Inside Athletics API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/checkout/sessions/:
    get:
      operationId: list-api-v1-checkout-sessions
      parameters:
        - description: Filter by customer
          explode: false
          in: query
          name: customer_id
          schema:
            description: Filter by customer
            type: string
        - description: Number of sessions to return
          explode: false
          in: query
          name: limit
          schema:
            description: Number of sessions to return
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StripeCheckoutSessionResponse"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List API v1 checkout sessions
    post:
      operationId: post-api-v1-checkout-sessions
      requestBody:
        content:
          application/json:
            schema:
